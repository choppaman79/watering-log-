<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>水やり日誌</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #EDEFE4;
    --card: #FBFAF4;
    --ink: #20301F;
    --ink-soft: #5C6B57;
    --water: #3E7CB1;
    --water-deep: #28577E;
    --sun: #E0A83B;
    --danger: #C5623C;
    --line: #D8D9C8;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', -apple-system, sans-serif;
    padding: 28px 16px 60px;
  }
  button { cursor: pointer; font-family: inherit; }
  button:focus-visible, input:focus-visible { outline: 2px solid var(--water); outline-offset: 2px; }
  .wrap { max-width: 720px; margin: 0 auto; }
  .header-row { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 6px; }
  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: clamp(28px, 5vw, 38px);
    margin: 0;
    letter-spacing: -0.01em;
  }
  .subtitle { color: var(--ink-soft); margin: 0 0 20px; font-size: 14px; }
  .name-box, .token-box {
    display: flex; align-items: center; gap: 8px;
    background: var(--card); border: 1px solid var(--line);
    border-radius: 10px; padding: 8px 12px; margin-bottom: 10px;
  }
  .name-box input, .token-box input {
    border: none; background: transparent; font-size: 14px; flex: 1; color: var(--ink); min-width: 0;
  }
  .name-box input:focus, .token-box input:focus { outline: none; }
  .token-row-wrap { margin-bottom: 12px; }
  .token-hint { font-size: 12px; color: var(--ink-soft); margin: 0 0 20px; line-height: 1.6; }
  .token-hint a { color: var(--water-deep); }
  .status { font-size: 13px; margin-bottom: 12px; display: none; padding: 8px 12px; border-radius: 8px; }
  .status.error { color: #fff; background: var(--danger); display: block; }
  .status.info { color: var(--ink-soft); display: block; }
  .empty {
    border: 1px dashed var(--line); border-radius: 12px; padding: 32px 20px;
    text-align: center; color: var(--ink-soft); font-size: 14px;
  }
  .plant-card {
    background: var(--card); border: 1px solid var(--line);
    border-radius: 12px; overflow: hidden; margin-bottom: 12px;
  }
  .plant-top { padding: 14px 16px; display: flex; align-items: center; gap: 12px; }
  .plant-info { flex: 1; min-width: 0; }
  .plant-name-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .plant-name { font-family: 'Fraunces', serif; font-weight: 600; font-size: 17px; }
  .interval-badge {
    font-size: 11px; color: var(--ink-soft); background: var(--bg);
    border-radius: 20px; padding: 2px 8px;
  }
  .gauge-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
  .droplets { display: flex; gap: 3px; }
  .gauge-label { font-size: 12px; font-weight: 500; }
  .water-btn {
    background: var(--water); color: #fff; border: none; border-radius: 8px;
    padding: 8px 14px; font-size: 13px; font-weight: 600;
    display: flex; align-items: center; gap: 6px; white-space: nowrap;
  }
  .water-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .plant-actions {
    border-top: 1px solid var(--line); padding: 6px 16px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .link-btn { background: none; border: none; font-size: 12px; padding: 6px 0; display: flex; align-items: center; gap: 4px; }
  .toggle-history { color: var(--water-deep); }
  .remove-btn { color: var(--ink-soft); }
  .history-panel { padding: 4px 16px 14px; background: var(--bg); display: none; }
  .history-panel.open { display: block; }
  .history-empty { font-size: 12px; color: var(--ink-soft); padding: 8px 0; }
  .history-item {
    display: flex; justify-content: space-between; font-size: 12px;
    font-family: 'JetBrains Mono', monospace; color: var(--ink-soft); padding: 2px 0;
  }
  .add-toggle-btn {
    width: 100%; background: transparent; border: 1.5px dashed var(--water);
    color: var(--water-deep); border-radius: 10px; padding: 12px; font-size: 14px;
    font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .add-panel {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 16px; display: none;
  }
  .add-panel.open { display: block; }
  .add-panel-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .add-panel-title { font-family: 'Fraunces', serif; font-weight: 600; font-size: 16px; }
  .close-btn { background: none; border: none; color: var(--ink-soft); }
  .add-fields { display: flex; flex-direction: column; gap: 10px; }
  .add-fields input[type="text"] {
    border: 1px solid var(--line); border-radius: 8px; padding: 9px 12px; font-size: 14px; width: 100%;
  }
  .interval-field { display: flex; align-items: center; gap: 8px; }
  .interval-field span { font-size: 13px; color: var(--ink-soft); white-space: nowrap; }
  .interval-field input { border: 1px solid var(--line); border-radius: 8px; padding: 9px 12px; font-size: 14px; width: 70px; }
  .submit-btn {
    background: var(--ink); color: #fff; border: none; border-radius: 8px;
    padding: 10px; font-size: 14px; font-weight: 600; margin-top: 4px;
  }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .footnote { font-size: 11px; color: var(--ink-soft); text-align: center; margin-top: 28px; }
  .loading { min-height: 400px; display: flex; align-items: center; justify-content: center; color: var(--ink-soft); }
  svg.icon { display: inline-block; vertical-align: middle; flex-shrink: 0; }
  .toggle-token-btn { background: none; border: none; color: var(--water-deep); font-size: 12px; padding: 4px 0 16px; }
</style>
</head>
<body>

<div id="app" class="loading">読み込み中…</div>

<script>
/* ===== この4行だけ、自分のGitHubリポジトリに合わせて書き換えてください ===== */
const GH_OWNER = "choppaman79";
const GH_REPO = "watering-log-";
const GH_BRANCH = "main";
const DATA_PATH = "data.json";
/* ======================================================================= */

const PALETTE = { water: '#3E7CB1', sun: '#E0A83B', danger: '#C5623C', line: '#D8D9C8', inkSoft: '#5C6B57' };

let plants = null;
let logs = null;
let dataSha = null; // GitHub blob sha, needed to overwrite the file
let userName = localStorage.getItem('watering_user_name') || '';
let ghToken = localStorage.getItem('watering_gh_token') || '';
let showAdd = false;
let showTokenField = !ghToken;
let openHistoryId = null;
let statusMsg = '';
let statusType = ''; // 'error' | 'info'
let busy = false;

// --- icons ---
function iconDroplet(color, filled) {
  return `<svg class="icon" width="14" height="14" viewBox="0 0 24 24" fill="${filled ? color : 'none'}" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z"/></svg>`;
}
function iconUser() {
  return `<svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="${PALETTE.inkSoft}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a8 8 0 0 1 16 0v1"/></svg>`;
}
function iconKey() {
  return `<svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="${PALETTE.inkSoft}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6"/><path d="m15.5 7.5 3 3L22 7l-3-3"/></svg>`;
}
function iconSprout() {
  return `<svg class="icon" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="${PALETTE.water}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 20h10"/><path d="M10 20c0-4.4 2-7.5 5-9"/><path d="M9.5 9.4c1 .8 1.6 2 2 3.2-2 .4-3.6.3-4.6-.5C5.9 11.3 5.3 9.7 5 8c1.7-.2 3.4.1 4.5 1.4z"/><path d="M14.1 6c-1.1 1.2-1.6 2.5-1.7 4 1.9-.1 3.4-.7 4.3-1.9 1-1.1 1.3-2.7 1.3-4.4-1.8.1-3.2.9-3.9 2.3z"/></svg>`;
}
function iconClock() {
  return `<svg class="icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="${PALETTE.water}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
}
function iconPlus() {
  return `<svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`;
}
function iconX() {
  return `<svg class="icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="${PALETTE.inkSoft}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
}

function daysSince(iso) {
  if (!iso) return null;
  return Math.floor((Date.now() - new Date(iso).getTime()) / 86400000);
}

function gaugeState(days, intervalDays) {
  if (days === null) return { pct: 0, label: '記録なし', color: PALETTE.inkSoft };
  const pct = Math.min(1, days / intervalDays);
  if (pct < 0.6) return { pct, label: `${days}日前`, color: PALETTE.water };
  if (pct < 1) return { pct, label: `${days}日前`, color: PALETTE.sun };
  return { pct: 1, label: `${days}日前・そろそろ`, color: PALETTE.danger };
}

function dropletsHtml(level, color) {
  const total = 5;
  const filled = Math.round((1 - level) * total);
  let html = '<div class="droplets">';
  for (let i = 0; i < total; i++) html += iconDroplet(i < filled ? color : PALETTE.line, i < filled);
  html += '</div>';
  return html;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// UTF-8 safe base64 encode/decode
function b64EncodeUtf8(str) {
  return btoa(unescape(encodeURIComponent(str)));
}
function b64DecodeUtf8(str) {
  return decodeURIComponent(escape(atob(str)));
}

function apiUrl(path) {
  return `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${path}`;
}

// ----- Data load (public read, no token needed) -----
async function loadData() {
  try {
    const res = await fetch(apiUrl(DATA_PATH) + `?ref=${GH_BRANCH}`, {
      headers: { 'Accept': 'application/vnd.github+json' },
      cache: 'no-store',
    });
    if (res.status === 404) {
      // data.json doesn't exist yet
      plants = [];
      logs = [];
      dataSha = null;
    } else if (!res.ok) {
      throw new Error(`GitHub API error: ${res.status}`);
    } else {
      const json = await res.json();
      dataSha = json.sha;
      const content = b64DecodeUtf8(json.content.replace(/\n/g, ''));
      const parsed = JSON.parse(content);
      plants = parsed.plants || [];
      logs = parsed.logs || [];
    }
    statusMsg = '';
  } catch (e) {
    statusMsg = 'データの読み込みに失敗しました。リポジトリ名やdata.jsonの設定を確認してください。';
    statusType = 'error';
    plants = plants || [];
    logs = logs || [];
  }
  render();
}

// ----- Data save (needs a Personal Access Token with repo contents write) -----
async function saveData() {
  if (!ghToken) {
    statusMsg = '保存にはGitHubトークンの入力が必要です。';
    statusType = 'error';
    showTokenField = true;
    render();
    return false;
  }
  busy = true;
  render();
  try {
    const body = {
      message: `水やり日誌を更新 (${new Date().toISOString()})`,
      content: b64EncodeUtf8(JSON.stringify({ plants, logs }, null, 2)),
      branch: GH_BRANCH,
    };
    if (dataSha) body.sha = dataSha;

    const res = await fetch(apiUrl(DATA_PATH), {
      method: 'PUT',
      headers: {
        'Accept': 'application/vnd.github+json',
        'Authorization': `Bearer ${ghToken}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(body),
    });

    if (res.status === 409 || res.status === 422) {
      // sha mismatch: someone else saved in the meantime. reload latest then let user retry.
      statusMsg = '他の人が同時に更新したため、最新のデータを再読み込みしました。もう一度お試しください。';
      statusType = 'error';
      await loadData();
      return false;
    }
    if (!res.ok) {
      const errJson = await res.json().catch(() => ({}));
      throw new Error(errJson.message || `GitHub API error: ${res.status}`);
    }
    const json = await res.json();
    dataSha = json.content.sha;
    statusMsg = '';
    busy = false;
    render();
    return true;
  } catch (e) {
    statusMsg = `保存に失敗しました: ${e.message}`;
    statusType = 'error';
    busy = false;
    render();
    return false;
  }
}

function lastWateredFor(plantId) {
  const l = logs.find(x => x.plantId === plantId);
  return l ? l.at : null;
}
function historyFor(plantId) {
  return logs.filter(l => l.plantId === plantId).slice(0, 20);
}

function render() {
  const app = document.getElementById('app');
  app.classList.remove('loading');

  if (plants === null || logs === null) {
    app.innerHTML = '読み込み中…';
    return;
  }

  let plantsHtml = '';
  if (plants.length === 0) {
    plantsHtml = `<div class="empty">まだ植物が登録されていません。下の「植物を追加」から始めましょう。</div>`;
  } else {
    plantsHtml = plants.map(p => {
      const last = lastWateredFor(p.id);
      const days = daysSince(last);
      const gauge = gaugeState(days, p.interval);
      const isOpen = openHistoryId === p.id;
      const hist = historyFor(p.id);
      let histHtml;
      if (hist.length === 0) {
        histHtml = `<div class="history-empty">記録はまだありません</div>`;
      } else {
        histHtml = hist.map(l => {
          const d = new Date(l.at);
          const dateStr = d.toLocaleString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
          return `<div class="history-item"><span>${dateStr}</span><span>${escapeHtml(l.by)}</span></div>`;
        }).join('');
      }
      return `
        <div class="plant-card">
          <div class="plant-top">
            <div class="plant-info">
              <div class="plant-name-row">
                <span class="plant-name">${escapeHtml(p.name)}</span>
                <span class="interval-badge">${p.interval}日ごと</span>
              </div>
              <div class="gauge-row">
                ${dropletsHtml(gauge.pct, gauge.color)}
                <span class="gauge-label" style="color:${gauge.color}">${gauge.label}</span>
              </div>
            </div>
            <button class="water-btn" data-action="water" data-id="${p.id}" ${busy ? 'disabled' : ''}>${iconDroplet('#fff', true)} 水やり完了</button>
          </div>
          <div class="plant-actions">
            <button class="link-btn toggle-history" data-action="toggle-history" data-id="${p.id}">${iconClock()} ${isOpen ? '履歴を閉じる' : '履歴を見る'}</button>
            <button class="link-btn remove-btn" data-action="remove" data-id="${p.id}" ${busy ? 'disabled' : ''}>削除</button>
          </div>
          <div class="history-panel ${isOpen ? 'open' : ''}">${histHtml}</div>
        </div>
      `;
    }).join('');
  }

  const tokenSection = showTokenField ? `
    <div class="token-row-wrap">
      <div class="token-box">
        ${iconKey()}
        <input type="password" autocomplete="off" id="tokenInput" placeholder="GitHub Personal Access Token" value="${escapeHtml(ghToken)}" />
      </div>
      <p class="token-hint">
        水やりを記録・削除するには、書き込み権限付きのGitHubトークンが必要です。
        GitHubの Settings → Developer settings → Personal access tokens で、このリポジトリへの Contents 書き込み権限を持つトークンを発行し、貼り付けてください。
        トークンはこの端末のブラウザにのみ保存され、他の人には送信されません。
      </p>
    </div>
  ` : `<button class="toggle-token-btn" id="showTokenBtn">トークンを変更</button>`;

  app.innerHTML = `
    <div class="wrap">
      <div class="header-row">
        <h1>水やり日誌</h1>
        ${iconSprout()}
      </div>
      <p class="subtitle">みんなで記録する、植物の水やりログ(GitHub連携)</p>

      <div class="name-box">
        ${iconUser()}
        <input type="text" autocomplete="off" id="userNameInput" placeholder="あなたの名前" value="${escapeHtml(userName)}" />
      </div>

      ${tokenSection}

      ${statusMsg ? `<div class="status ${statusType}">${escapeHtml(statusMsg)}</div>` : ''}

      <div id="plantsList">${plantsHtml}</div>

      <div style="margin-top:20px;">
        <button class="add-toggle-btn" id="addToggleBtn" style="display:${showAdd ? 'none' : 'flex'}">${iconPlus()} 植物を追加</button>
        <div class="add-panel ${showAdd ? 'open' : ''}" id="addPanel">
          <div class="add-panel-head">
            <span class="add-panel-title">新しい植物</span>
            <button class="close-btn" id="closeAddBtn">${iconX()}</button>
          </div>
          <div class="add-fields">
            <input type="text" autocomplete="off" id="newNameInput" placeholder="植物の名前（例: モンステラ）" value="${escapeHtml(window.__draftName || '')}" />
            <div class="interval-field">
              <span>水やり間隔</span>
              <input type="text" inputmode="numeric" autocomplete="off" id="newIntervalInput" value="${escapeHtml(window.__draftInterval || '7')}" />
              <span>日ごと</span>
            </div>
            <button class="submit-btn" id="submitAddBtn" ${busy ? 'disabled' : ''}>追加する</button>
          </div>
        </div>
      </div>

      <p class="footnote">このデータはGitHubリポジトリ(${escapeHtml(GH_OWNER)}/${escapeHtml(GH_REPO)})に保存され、ページを開いた全員で共有されます</p>
    </div>
  `;

  attachHandlers();
}

function attachHandlers() {
  const userNameInput = document.getElementById('userNameInput');
  if (userNameInput) {
    userNameInput.addEventListener('input', (e) => {
      userName = e.target.value;
      localStorage.setItem('watering_user_name', userName);
    });
  }

  const tokenInput = document.getElementById('tokenInput');
  if (tokenInput) {
    tokenInput.addEventListener('input', (e) => {
      ghToken = e.target.value;
      localStorage.setItem('watering_gh_token', ghToken);
    });
  }
  const showTokenBtn = document.getElementById('showTokenBtn');
  if (showTokenBtn) showTokenBtn.addEventListener('click', () => { showTokenField = true; render(); });

  document.querySelectorAll('[data-action="water"]').forEach(btn => {
    btn.addEventListener('click', () => recordWatering(btn.dataset.id));
  });
  document.querySelectorAll('[data-action="toggle-history"]').forEach(btn => {
    btn.addEventListener('click', () => {
      openHistoryId = openHistoryId === btn.dataset.id ? null : btn.dataset.id;
      render();
    });
  });
  document.querySelectorAll('[data-action="remove"]').forEach(btn => {
    btn.addEventListener('click', () => removePlant(btn.dataset.id));
  });

  const addToggleBtn = document.getElementById('addToggleBtn');
  if (addToggleBtn) addToggleBtn.addEventListener('click', () => { showAdd = true; render(); });
  const closeAddBtn = document.getElementById('closeAddBtn');
  if (closeAddBtn) closeAddBtn.addEventListener('click', () => { showAdd = false; render(); });

  const newNameInput = document.getElementById('newNameInput');
  if (newNameInput) {
    newNameInput.addEventListener('input', (e) => { window.__draftName = e.target.value; });
    if (showAdd) newNameInput.focus();
  }
  const newIntervalInput = document.getElementById('newIntervalInput');
  if (newIntervalInput) {
    newIntervalInput.addEventListener('input', (e) => {
      window.__draftInterval = e.target.value.replace(/[^0-9]/g, '');
    });
  }

  const submitAddBtn = document.getElementById('submitAddBtn');
  if (submitAddBtn) submitAddBtn.addEventListener('click', addPlant);
}

async function addPlant() {
  const name = (window.__draftName || '').trim();
  if (!name || busy) return;
  const interval = Number(window.__draftInterval) || 7;
  const plant = {
    id: `plant_${Date.now()}`,
    name,
    interval,
    createdAt: new Date().toISOString(),
  };
  const prevPlants = plants;
  plants = [...plants, plant];
  const ok = await saveData();
  if (ok) {
    window.__draftName = '';
    window.__draftInterval = '7';
    showAdd = false;
    render();
  } else {
    plants = prevPlants;
  }
}

async function removePlant(id) {
  if (busy) return;
  const prevPlants = plants, prevLogs = logs;
  plants = plants.filter(p => p.id !== id);
  logs = logs.filter(l => l.plantId !== id);
  const ok = await saveData();
  if (ok) {
    if (openHistoryId === id) openHistoryId = null;
    render();
  } else {
    plants = prevPlants;
    logs = prevLogs;
  }
}

async function recordWatering(plantId) {
  if (busy) return;
  const who = (userName || '').trim() || '名無し';
  const entry = {
    id: `log_${Date.now()}`,
    plantId,
    by: who,
    at: new Date().toISOString(),
  };
  const prevLogs = logs;
  logs = [entry, ...logs];
  const ok = await saveData();
  if (!ok) logs = prevLogs;
}

loadData();
</script>
</body>
</html>
